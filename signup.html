<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow – Create Account</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <!-- Our CSS -->
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="dark">

  <!-- Centered signup card -->
  <div class="auth-screen">
    <div class="auth-box">

      <!-- Logo -->
      <div class="d-flex align-items-center gap-2 mb-4">
        <div class="logo-icon">T</div>
        <span style="font-size:22px; font-weight:700">TaskFlow</span>
      </div>

      <h5 class="fw-bold mb-1">Create your account</h5>
      <p class="text-muted mb-4" style="font-size:13px">Start organizing your tasks today</p>

      <!-- Error message (hidden by default) -->
      <div id="errorMsg" class="alert alert-danger py-2" style="display:none; font-size:13px"></div>
      <!-- Success message (hidden by default) -->
      <div id="successMsg" class="alert alert-success py-2" style="display:none; font-size:13px"></div>

      <!-- Full name field -->
      <div class="mb-3">
        <label class="form-label small-label">Full Name</label>
        <input type="text" class="form-control" id="name" placeholder="Ali Khan" />
      </div>

      <!-- Email field -->
      <div class="mb-3">
        <label class="form-label small-label">Email</label>
        <input type="email" class="form-control" id="email" placeholder="you@example.com" />
      </div>

      <!-- Password field -->
      <div class="mb-3">
        <label class="form-label small-label">Password (min 6 characters)</label>
        <input type="password" class="form-control" id="password" placeholder="••••••••" />
      </div>

      <!-- Submit button -->
      <button class="btn btn-success w-100 fw-bold mb-3" onclick="doSignup()">
        Create Account
      </button>

      <!-- Link to login -->
      <p class="text-center text-muted mb-0" style="font-size:13px">
        Already have an account?
        <a href="login.html" class="text-success text-decoration-none fw-semibold">Sign in</a>
      </p>

    </div>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <!-- Signup JS -->
  <script src="js/signup.js"></script>
</body>
</html>
